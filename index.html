<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Quiz Application</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spectral:wght@500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="site-bar centered">
      <div class="brand">
        <span class="brand-mark"></span>
        <span class="brand-name">Interactive Quiz Application</span>
      </div>
    </div>
  </header>

  <main class="app">
    <section class="quiz-card" aria-live="polite">
      <header class="quiz-header">
        <p class="eyebrow">Skill Check</p>
        <h1>Fundamentals Quiz</h1>
        <p class="subtitle">Test your web fundamentals with fast, focused questions.</p>
      </header>

      <section id="start-screen" class="screen">
        <div class="start-visual">
          <div class="ring"></div>
          <div class="ring ring-two"></div>
          <div class="ring ring-three"></div>
        </div>
        <button id="start-btn" class="btn primary">Start Quiz</button>
      </section>

      <section id="quiz-screen" class="screen hidden">
        <div class="progress">
          <span id="progress-text">Question 1 of 10</span>
          <span id="timer-text" class="timer">15s</span>
          <div class="progress-bar">
            <div id="progress-fill"></div>
          </div>
        </div>

        <div id="question-card" class="question-card">
          <h2 id="question-text">Question text</h2>
          <div id="answer-buttons" class="answers" role="list"></div>
        </div>

        <div class="actions">
          <button id="next-btn" class="btn ghost" disabled>Next Question</button>
        </div>
      </section>

      <section id="result-screen" class="screen hidden">
        <h2>Quiz Complete</h2>
        <p id="score-text" class="score-text">You scored 0 out of 10.</p>
        <p id="score-detail" class="score-detail">0 correct answers.</p>
        <button id="restart-btn" class="btn primary">Restart Quiz</button>
      </section>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <span>Built for focused practice</span>
      <span class="footer-dot"></span>
      <span>Updated question sets</span>
      <span class="footer-dot"></span>
      <span>15s per question</span>
    </div>
  </footer>

  <canvas id="confetti-canvas" aria-hidden="true"></canvas>
  <script src="script.js"></script>
</body>
</html>
